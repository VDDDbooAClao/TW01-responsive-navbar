<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Logo Navbar</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar bg-body-tertiary fixed-top">
    <div class="container-fluid">
      <!-- Left corner logo as navbar-brand (not clickable) -->
      <span class="navbar-brand fw-bold">LOGO</span>

      <!-- Centered nav items with second logo -->
      <ul class="navbar-nav d-flex flex-row justify-content-center align-items-center mx-auto">
        <!-- Logo inside nav (thicker font, not clickable) -->
        <li class="nav-item"><span class="nav-link mx-3 fw-bold">Logo</span></li>
        <li class="nav-item"><a class="nav-link mx-3" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link mx-3" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link mx-3" href="#">Services</a></li>
        <li class="nav-item"><a class="nav-link mx-3" href="#">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link mx-3" href="#">Contact</a></li>
        <li class="nav-item"><a href="#" class="login-button mx-3">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
          integrity="sha384-YvpcrYftf2vvoF8z+3fQ9Q9F+5l5Q5e5r5f5Q5e5r5f5Q5e5r5f5Q5e5r5f5Q5e5" 
          crossorigin="anonymous"></script>
</body>
</html>
